{% extends "base.html" %}
{% block title %}Contests - PrepTracker{% endblock %}
{% block header_title %}Contest Tracker{% endblock %}
{% block content %}
<div class="card" style="margin-bottom: 2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; cursor: pointer;" onclick="document.getElementById('add-contest-form').classList.toggle('hidden')">
        <h3 style="margin: 0;"><i class="fa-solid fa-trophy" style="color: var(--warning-color);"></i> Log a New Contest</h3>
        <i class="fa-solid fa-chevron-down"></i>
    </div>
    <form id="add-contest-form" class="hidden" method="POST" action="{{ url_for('dsa.add_contest') }}" style="margin-top: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
        <div class="grid-container" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
            <div class="form-group">
                <label for="name">Contest Name</label>
                <input type="text" id="name" name="name" class="form-input" required placeholder="e.g. Weekly Contest 350">
            </div>
            <div class="form-group">
                <label for="platform">Platform</label>
                <select id="platform" name="platform" class="form-input" required>
                    <option value="LeetCode">LeetCode</option>
                    <option value="Codeforces">Codeforces</option>
                    <option value="CodeChef">CodeChef</option>
                    <option value="HackerRank">HackerRank</option>
                </select>
            </div>
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" class="form-input" required>
            </div>
            <div class="form-group">
                <label for="rank">Global Rank</label>
                <input type="number" id="rank" name="rank" class="form-input" required placeholder="e.g. 450">
            </div>
            <div class="form-group">
                <label for="rating_before">Rating Before</label>
                <input type="number" id="rating_before" name="rating_before" class="form-input" placeholder="e.g. 1650">
            </div>
            <div class="form-group">
                <label for="rating_after">Rating After</label>
                <input type="number" id="rating_after" name="rating_after" class="form-input" placeholder="e.g. 1710">
            </div>
        </div>
