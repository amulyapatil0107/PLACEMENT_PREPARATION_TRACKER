{% extends "base.html" %}
{% block title %}Profile - PrepTracker{% endblock %}
{% block header_title %}User Profile{% endblock %}
{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div class="card">
        <h2 style="margin-bottom: 1.5rem;"><i class="fa-solid fa-user-gear" style="color: var(--primary-color);"></i> Manage Profile</h2>
        <form method="POST" action="{{ url_for('auth.profile') }}">
            <div class="form-group">
                <label>Username</label>
                <input type="text" class="form-input" value="{{ user.username }}" readonly style="background: rgba(255, 255, 255, 0.02); color: var(--text-secondary); cursor: not-allowed;">
                <small style="color: var(--text-muted); margin-top: 0.2rem;">Username cannot be changed.</small>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-input" value="{{ user.email }}" required>
            </div>
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Leave blank to keep current password">
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
