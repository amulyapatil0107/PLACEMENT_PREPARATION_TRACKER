{% extends "base.html" %}
{% block title %}Aptitude Tracker - PrepTracker{% endblock %}
{% block header_title %}Aptitude Preparation{% endblock %}
{% block content %}
<div class="card" style="margin-bottom: 2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; cursor: pointer;" onclick="document.getElementById('add-custom-form').classList.toggle('hidden')">
        <h3 style="margin: 0;"><i class="fa-solid fa-brain" style="color: var(--accent-cyan);"></i> Add Custom Aptitude Topic</h3>
        <i class="fa-solid fa-chevron-down"></i>
    </div>
    <form id="add-custom-form" class="hidden" method="POST" action="{{ url_for('aptitude.add_custom_topic') }}" style="margin-top: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
        <div class="grid-container" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
            <div class="form-group" style="grid-column: span 2;">
                <label for="topic_name">Topic Name</label>
                <input type="text" id="topic_name" name="topic_name" class="form-input" required placeholder="e.g. Compound Interest">
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category" class="form-input" required>
