{% extends "base.html" %}
{% block title %}Analytics - PrepTracker{% endblock %}
{% block header_title %}Analytics & Progress Visualizations{% endblock %}
{% block content %}
<div id="analytics-charts-container">
    <div class="grid-container">
        <div class="card">
            <h3 style="margin-bottom: 1rem;"><i class="fa-solid fa-tags" style="color: var(--primary-color);"></i> Problems by Topic</h3>
            <div style="height: 300px; display: flex; justify-content: center; align-items: center;">
                <canvas id="topicChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 1rem;"><i class="fa-solid fa-layer-group" style="color: var(--warning-color);"></i> Problems by Difficulty</h3>
            <div style="height: 300px; display: flex; justify-content: center; align-items: center;">
                <canvas id="difficultyChart"></canvas>
            </div>
        </div>
    </div>

    <div class="grid-container" style="grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));">
        <div class="card">
            <h3 style="margin-bottom: 1rem;"><i class="fa-solid fa-chart-line" style="color: var(--accent-cyan);"></i> Monthly Solving Trends</h3>
            <div style="height: 300px;">
                <canvas id="monthlyChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 1rem;"><i class="fa-solid fa-trophy" style="color: var(--primary-color);"></i> Contest Attendance by Platform</h3>
            <div style="height: 300px;">
                <canvas id="contestChart"></canvas>
            </div>
        </div>
