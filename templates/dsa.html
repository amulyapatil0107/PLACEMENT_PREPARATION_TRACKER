{% extends "base.html" %}
{% block title %}DSA Tracker - PrepTracker{% endblock %}
{% block header_title %}DSA Coding Tracker{% endblock %}
{% block content %}
<div class="card" style="margin-bottom: 2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; cursor: pointer;" onclick="document.getElementById('add-problem-form').classList.toggle('hidden')">
        <h3 style="margin: 0;"><i class="fa-solid fa-circle-plus" style="color: var(--success-color);"></i> Log a New DSA Problem</h3>
        <i class="fa-solid fa-chevron-down"></i>
    </div>
    <form id="add-problem-form" class="hidden" method="POST" action="{{ url_for('dsa.add_problem') }}" style="margin-top: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
        <div class="grid-container" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
            <div class="form-group">
                <label for="name">Problem Name</label>
                <input type="text" id="name" name="name" class="form-input" required placeholder="e.g. Two Sum">
            </div>
            <div class="form-group">
                <label for="topic">Topic</label>
                <input type="text" id="topic" name="topic" class="form-input" required placeholder="e.g. Arrays, Trees">
            </div>
            <div class="form-group">
                <label for="difficulty">Difficulty</label>
                <select id="difficulty" name="difficulty" class="form-input" required>
                    <option value="Easy">Easy</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="Hard">Hard</option>
                </select>
            </div>
            <div class="form-group">
                <label for="platform">Platform</label>
                <select id="platform" name="platform" class="form-input" required>
                    <option value="LeetCode">LeetCode</option>
                    <option value="GeeksforGeeks">GeeksforGeeks</option>
                    <option value="HackerRank">HackerRank</option>
                    <option value="CodeChef">CodeChef</option>
                    <option value="Codeforces">Codeforces</option>
                </select>
            </div>
        </div>
        <div class="form-group" style="margin-top: 1rem;">
            <label for="notes">Notes / Approach / Solution Link</label>
            <textarea id="notes" name="notes" class="form-input" rows="3" placeholder="Enter notes, key patterns, or code snippets here..."></textarea>
        </div>
        <div style="display: flex; align-items: center; gap: 1.5rem; margin-top: 1rem;">
            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: var(--text-secondary);">
                <input type="checkbox" name="status" value="solved" style="width: 18px; height: 18px;"> Mark as Solved
            </label>
            <button type="submit" class="btn btn-primary">Add Problem</button>
        </div>
    </form>
</div>

<div class="card" style="margin-bottom: 2rem; padding: 1.25rem;">
    <form method="GET" action="{{ url_for('dsa.list_problems') }}" class="filter-panel">
        <div class="filter-group" style="flex: 2; min-width: 200px;">
            <label>Search</label>
            <input type="text" name="search" class="form-input filter-input" placeholder="Search by name or notes..." value="{{ search }}">
        </div>
        <div class="filter-group">
            <label>Difficulty</label>
            <select name="difficulty" class="form-input filter-input">
                <option value="">All</option>
                <option value="Easy" {% if difficulty == 'Easy' %}selected{% endif %}>Easy</option>
                <option value="Medium" {% if difficulty == 'Medium' %}selected{% endif %}>Medium</option>
                <option value="Hard" {% if difficulty == 'Hard' %}selected{% endif %}>Hard</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Topic</label>
            <select name="topic" class="form-input filter-input">
                <option value="">All</option>
                {% for t in topics %}
                    <option value="{{ t }}" {% if topic == t %}selected{% endif %}>{{ t }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="filter-group">
            <label>Platform</label>
            <select name="platform" class="form-input filter-input">
                <option value="">All</option>
                <option value="LeetCode" {% if platform == 'LeetCode' %}selected{% endif %}>LeetCode</option>
                <option value="GeeksforGeeks" {% if platform == 'GeeksforGeeks' %}selected{% endif %}>GeeksforGeeks</option>
                <option value="HackerRank" {% if platform == 'HackerRank' %}selected{% endif %}>HackerRank</option>
                <option value="CodeChef" {% if platform == 'CodeChef' %}selected{% endif %}>CodeChef</option>
                <option value="Codeforces" {% if platform == 'Codeforces' %}selected{% endif %}>Codeforces</option>
            </select>
        </div>
