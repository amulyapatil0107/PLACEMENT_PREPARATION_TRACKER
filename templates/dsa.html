{% extends "base.html" %}
{% block title %}DSA Tracker - PrepTracker{% endblock %}
{% block header_title %}DSA Coding Tracker{% endblock %}
{% block content %}
<div class="card" style="margin-bottom: 2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; cursor: pointer;" onclick="document.getElementById('add-problem-form').classList.toggle('hidden')">
        <h3 style="margin: 0;"><i class="fa-solid fa-circle-plus" style="color: var(--success-color);"></i> Log a New DSA Problem</h3>
        <i class="fa-solid fa-chevron-down"></i>
    </div>
    <form id="add-problem-form" class="hidden" method="POST" action="{{ url_for('dsa.add_problem') }}" style="margin-top: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
        <div class="grid-container" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
            <div class="form-group">
                <label for="name">Problem Name</label>
                <input type="text" id="name" name="name" class="form-input" required placeholder="e.g. Two Sum">
            </div>
            <div class="form-group">
                <label for="topic">Topic</label>
                <input type="text" id="topic" name="topic" class="form-input" required placeholder="e.g. Arrays, Trees">
            </div>
            <div class="form-group">
                <label for="difficulty">Difficulty</label>
                <select id="difficulty" name="difficulty" class="form-input" required>
                    <option value="Easy">Easy</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="Hard">Hard</option>
                </select>
            </div>
            <div class="form-group">
                <label for="platform">Platform</label>
                <select id="platform" name="platform" class="form-input" required>
                    <option value="LeetCode">LeetCode</option>
                    <option value="GeeksforGeeks">GeeksforGeeks</option>
                    <option value="HackerRank">HackerRank</option>
                    <option value="CodeChef">CodeChef</option>
                    <option value="Codeforces">Codeforces</option>
                </select>
            </div>
        </div>
