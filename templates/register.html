{% extends "base.html" %}
{% block title %}Register - PrepTracker{% endblock %}
{% block content %}
<div class="main-content full-width">
    <div class="card auth-card">
        <div class="auth-header">
            <i class="fa-solid fa-graduation-cap logo-icon" style="font-size: 3rem; margin-bottom: 1rem;"></i>
            <h1>Create Account</h1>
            <p>Start tracking your placement journey today</p>
        </div>
        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-input" required placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-input" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" required placeholder="Create password">
            </div>
            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <input type="password" id="confirm" name="confirm" class="form-input" required placeholder="Repeat password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign Up</button>
        </form>
        <div class="auth-links">
            Already have an account? <a href="{{ url_for('auth.login') }}">Log in here</a>
        </div>
    </div>
</div>
{% endblock %}
