{% extends "base.html" %}
{% block title %}Interview Notes - PrepTracker{% endblock %}
{% block header_title %}Interview Notes Module{% endblock %}
{% block content %}
<div class="card" style="margin-bottom: 2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; cursor: pointer;" onclick="document.getElementById('add-note-form').classList.toggle('hidden')">
        <h3 style="margin: 0;"><i class="fa-solid fa-file-pen" style="color: var(--primary-color);"></i> Write a New Interview Note</h3>
        <i class="fa-solid fa-chevron-down"></i>
    </div>
    <form id="add-note-form" class="hidden" method="POST" action="{{ url_for('notes.add_note') }}" style="margin-top: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
        <div class="grid-container" style="grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));">
            <div class="form-group" style="grid-column: span 2;">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" class="form-input" required placeholder="e.g. ACID Properties in DBMS">
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category" class="form-input" required>
                    <option value="OOP">OOP</option>
                    <option value="DBMS">DBMS</option>
                    <option value="Operating Systems">Operating Systems</option>
                    <option value="Computer Networks">Computer Networks</option>
                    <option value="HR Questions">HR Questions</option>
                    <option value="General">General</option>
                </select>
            </div>
        </div>
        <div class="form-group" style="margin-top: 1rem;">
            <label for="content">Note Content</label>
            <textarea id="content" name="content" class="form-input" rows="8" required placeholder="Type notes here..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Save Note</button>
    </form>
</div>

<div class="card" style="margin-bottom: 2rem; padding: 1.25rem;">
    <form method="GET" action="{{ url_for('notes.list_notes') }}" class="filter-panel">
        <div class="filter-group" style="flex: 2; min-width: 200px;">
            <label>Search Notes</label>
            <input type="text" name="search" class="form-input filter-input" placeholder="Search by title or content..." value="{{ search }}">
        </div>
        <div class="filter-group">
            <label>Category Filter</label>
            <select name="category" class="form-input filter-input">
                <option value="">All Categories</option>
                {% for cat in categories %}
                    <option value="{{ cat }}" {% if category == cat %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
            </select>
        </div>
